<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 160" fill="none" role="img" aria-label="ViiwLink — A Virtual Life">

  <!-- Infinity / double-loop mark above the "i" in viw -->
  <!-- Centered roughly at x=175 (middle of the "iw" section) -->
  <path d="
    M148 34
    C148 26 154 20 162 20
    C170 20 176 26 176 34
    C176 42 170 48 162 48
    C154 48 148 42 148 34
    Z
  " stroke="#1d2566" stroke-width="5" fill="none" stroke-linejoin="round"/>
  <path d="
    M176 34
    C176 26 182 20 190 20
    C198 20 204 26 204 34
    C204 42 198 48 190 48
    C182 48 176 42 176 34
    Z
  " stroke="#1d2566" stroke-width="5" fill="none" stroke-linejoin="round"/>

  <!-- V -->
  <path d="M18 60 L62 140 L106 60" stroke="#1d2566" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- i (left stem) -->
  <line x1="136" y1="60" x2="136" y2="140" stroke="#1d2566" stroke-width="18" stroke-linecap="round"/>

  <!-- i (right stem / pairs with loop) -->
  <line x1="170" y1="60" x2="170" y2="140" stroke="#1d2566" stroke-width="18" stroke-linecap="round"/>

  <!-- W -->
  <path d="M200 60 L222 140 L244 95 L266 140 L288 60" stroke="#1d2566" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- "link" in lighter weight, right of W -->
  <text x="310" y="128" font-family="system-ui, -apple-system, 'Segoe UI', Arial, sans-serif"
        font-size="44" font-weight="300" fill="#1d2566" letter-spacing="-1">link</text>

  <!-- "A Virtual Life" tagline -->
  <text x="212" y="157" font-family="system-ui, -apple-system, 'Segoe UI', Arial, sans-serif"
        font-size="16" font-weight="300" fill="#1d2566" text-anchor="middle" letter-spacing="1" opacity="0.75">A Virtual Life</text>

</svg>
